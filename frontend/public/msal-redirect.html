<!doctype html>
<!-- Página de retorno do MSAL (popup/iframe do login Microsoft).
     PRECISA ser uma página estática em branco: se o redirect cair na raiz do
     app, o React boota dentro do popup e o router reescreve a URL antes do
     MSAL ler o código de autenticação (o popup fica preso na "tela do Flow").
     A janela que abriu o popup lê o hash desta URL e fecha o popup sozinha. -->
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Autenticando…</title>
  </head>
  <body style="font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #64748b;">
    Autenticando com a Microsoft… esta janela fecha sozinha.
  </body>
</html>
